name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Extract Project
        run: |
          if [ -f "*.zip" ]; then
            unzip -q *.zip -d project
            echo "✓ ZIP extracted successfully"
          else
            echo "⚠ No ZIP file found, checking for existing project structure..."
          fi
          ls -la

      - name: Move Project (if ZIP exists)
        run: |
          if [ -d "project" ]; then
            PROJECT_DIR=$(find project -mindepth 1 -maxdepth 1 -type d | head -n 1)
            if [ -n "$PROJECT_DIR" ]; then
              cp -r "$PROJECT_DIR"/* .
              cp -r "$PROJECT_DIR"/.[^.]* . 2>/dev/null || true
              echo "✓ Project moved to workspace"
              rm -rf project
            fi
          fi

      - name: Verify Project Structure
        run: |
          if [ ! -f "build.gradle" ] && [ ! -f "build.gradle.kts" ]; then
            echo "❌ Error: build.gradle not found!"
            ls -la
            exit 1
          fi
          echo "✓ Project structure verified"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Create key.properties
        run: |
          cat > key.properties <<EOF
          storePassword=dummy123
          keyPassword=dummy123
          keyAlias=dummy
          storeFile=dummy.keystore
          EOF

      - name: Generate Dummy Keystore
        run: |
          keytool -genkeypair \
            -keystore dummy.keystore \
            -storepass dummy123 \
            -keypass dummy123 \
            -alias dummy \
            -dname "CN=GitHub,O=Actions,C=ID" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
          echo "✓ Keystore generated"

      - name: Grant Permission to Gradle
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✓ gradlew permission granted"
          else
            echo "⚠ gradlew not found, using system gradle"
          fi

      - name: Build Debug APK
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug --stacktrace
          else
            gradle assemble --stacktrace
          fi

      - name: List Build Outputs
        run: find . -name "*.apk" -type f 2>/dev/null

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: "**/build/outputs/apk/*/*.apk"
          if-no-files-found: warn

name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Extract Project
        run: |
          unzip "*.zip" -d project
          ls -R project

      - name: Move Project
        run: |
          PROJECT_DIR=$(find project -mindepth 1 -maxdepth 1 -type d | head -n 1)
          cp -r "$PROJECT_DIR"/* .
          cp -r "$PROJECT_DIR"/.[^.]* . 2>/dev/null || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create random key.properties
        run: |
          cat > key.properties <<EOF
          storePassword=dummy123
          keyPassword=dummy123
          keyAlias=dummy
          storeFile=dummy.keystore
          EOF

      - name: Generate Dummy Keystore
        run: |
          keytool -genkeypair \
            -keystore dummy.keystore \
            -storepass dummy123 \
            -keypass dummy123 \
            -alias dummy \
            -dname "CN=GitHub,O=Actions,C=ID" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: app/build/outputs/apk/debug/*.apk
